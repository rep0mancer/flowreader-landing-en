  </g>
  <text x="144" y="93" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">FlowReader</text>
  
  <text x="600" y="220" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Read 2-3x Faster</text>
  <text x="600" y="280" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#6B7280">RSVP Speed Reading App for iOS</text>
  
  <g transform="translate(460, 340)">
