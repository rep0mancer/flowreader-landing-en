    <rect x="30" y="210" width="120" height="20" rx="10" fill="url(#accent)"/>
    <text x="90" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0A0A0F">+ Import your first text</text>
  </g>
  
  <g transform="translate(680, 360)">
