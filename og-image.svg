    <text x="80" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">100% Private & GDPR</text>
  </g>
  
  <text x="600" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">iOS App • Speed Reading • Coming Soon</text>
