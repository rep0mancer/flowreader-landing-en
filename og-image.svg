    <rect x="65" y="8" width="50" height="5" rx="2.5" fill="#1F1F2E"/>
    <rect x="50" y="60" width="80" height="80" rx="16" fill="url(#accent)" opacity="0.2"/>
    <text x="90" y="105" text-anchor="middle" font-size="40">⚡</text>
    <text x="90" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Add your first</text>
